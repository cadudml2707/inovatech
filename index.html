<!DOCTYPE html>
<html lang="pt-BR">
<!-- 
  ========================================================================
  Módulo: Tela de Cadastro/Perfil da Propriedade (O "Cérebro" do App)
  ========================================================================
-->
<head>
    <meta name="author" content="[Samuel]">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil da Propriedade | AgroApp</title>
    <!-- Fontes do Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
    <!-- Ícones (Lucide) -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="container">
        <!-- Cabeçalho -->
        <header class="header">
            <i data-lucide="leaf" class="icon-logo"></i>
            <div>
                <h1>Perfil da Propriedade</h1>
                <p>O cérebro do seu cultivo. Informe os dados para análises precisas.</p>
            </div>
        </header>

        <form id="propertyForm" class="property-form">
            
            <!-- Seção 1: Localização -->
            <section class="form-section">
                <div class="section-header">
                    <i data-lucide="map-pin"></i>
                    <h2>Localização</h2>
                </div>
                <p class="section-desc">Onde sua propriedade está localizada?</p>
                
                <div class="input-group">
                    <label for="municipio">Município</label>
                    <select id="municipio" name="municipio" required>
                        <option value="" disabled selected>Selecione o município...</option>
                        <option value="castanhal">Castanhal</option>
                        <option value="tomé-açu">Tomé-Açu</option>
                        <option value="igarapé-miri">Igarapé-Miri</option>
                        <option value="breves">Breves</option>
                        <option value="altamira">Altamira</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="comunidade">Comunidade/Vila</label>
                    <input type="text" id="comunidade" name="comunidade" placeholder="Ex: Ramal do km 12" required>
                </div>
            </section>

            <!-- Seção 2: Tipo de Solo -->
            <!-- Usando labels customizados para simular cards (hack de UX) -->
            <section class="form-section">
                <div class="section-header">
                    <i data-lucide="mountain-snow"></i>
                    <h2>Tipo de Solo</h2>
                </div>
                <p class="section-desc">Qual a característica principal do seu solo?</p>
                
                <div class="selection-grid" id="soilTypeGrid">
                    <!-- Opção 1 -->
                    <label class="selection-card radio-card">
                        <input type="radio" name="solo" value="arenoso" required>
                        <div class="card-content">
                            <span class="emoji">🏜️</span>
                            <h3>Arenoso</h3>
                            <p>Mais solto, seca rápido</p>
                        </div>
                    </label>
                    
                    <!-- Opção 2 -->
                    <label class="selection-card radio-card">
                        <input type="radio" name="solo" value="argiloso">
                        <div class="card-content">
                            <span class="emoji">🧱</span>
                            <h3>Argiloso</h3>
                            <p>Mais compacto, retém água</p>
                        </div>
                    </label>

                    <!-- Opção 3 -->
                    <label class="selection-card radio-card">
                        <input type="radio" name="solo" value="misto">
                        <div class="card-content">
                            <span class="emoji">🌱</span>
                            <h3>Misto</h3>
                            <p>Equilíbrio entre areia e argila</p>
                        </div>
                    </label>
                </div>
            </section>

            <!-- Seção 3: Culturas Principais -->
            <!-- Checkboxes com estilo de card para selecão múltipla -->
            <section class="form-section">
                <div class="section-header">
                    <i data-lucide="sprout"></i>
                    <h2>Culturas Principais</h2>
                </div>
                <p class="section-desc">O que você mais planta na propriedade? (Selecione 1 ou mais)</p>
                
                <div class="selection-grid crops-grid" id="cropsGrid">
                    <label class="selection-card checkbox-card">
                        <input type="checkbox" name="culturas" value="mandioca">
                        <div class="card-content">
                            <span class="emoji">🥔</span>
                            <h3>Mandioca</h3>
                        </div>
                    </label>
                    
                    <label class="selection-card checkbox-card">
                        <input type="checkbox" name="culturas" value="acai">
                        <div class="card-content">
                            <span class="emoji">🧉</span>
                            <h3>Açaí</h3>
                        </div>
                    </label>
                    <label class="selection-card checkbox-card">
                        <input type="checkbox" name="culturas" value="cupuacu">
                        <div class="card-content">
                            <span class="emoji">🍈</span>
                            <h3>Cupuaçu</h3>
                        </div>
                    </label>

                    <label class="selection-card checkbox-card">
                        <input type="checkbox" name="culturas" value="milho">
                        <div class="card-content">
                            <span class="emoji">🌽</span>
                            <h3>Milho</h3>
                        </div>
                    </label>
                    
                    <label class="selection-card checkbox-card">
                        <input type="checkbox" name="culturas" value="cacau">
                        <div class="card-content">
                            <span class="emoji">🍫</span>
                            <h3>Cacau</h3>
                        </div>
                    </label>
                    
                    <label class="selection-card checkbox-card custom-add" id="addCultureBtn">
                        <input type="checkbox" name="culturas" value="outros" style="display:none;">
                        <div class="card-content">
                            <i data-lucide="plus-circle" class="add-icon"></i>
                            <h3>Outros</h3>
                        </div>
                    </label>
                </div>
            </section>

            <!-- Submit do Form -->
            <div class="action-bar">
                <button type="submit" class="btn-submit">
                    <span>Salvar Perfil da Propriedade</span>
                    <i data-lucide="arrow-right"></i>
                </button>
            </div>
        </form>
    </div>

    <!-- Script JS -->
    <script src="script.js"></script>
    <script>
        // Init icons
        lucide.createIcons();
    </script>
</body>
</html>
